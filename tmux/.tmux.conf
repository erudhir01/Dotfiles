setw -g mode-keys vi                                   # Use vim keybindings in copy mode

set -g status-position top                             # Put status on the top of window
set -g status-justify absolute-centre                  # Put status on the center fo window
set -g status-style "bg=default"                       # Background in default color
set -g window-status-current-style "fg=blue"          # Background in white, and Foreground in Black
set -g status-interval 5                               # Set interval of status in 5 seconds
set -g status-left ""                                  # Remove Info on left of status
set -g status-right ""                                 # Remove Info on right of status

set -g history-limit 10000                             # Keep 10000 lines of scrollback history
set -g base-index 1                                    # Start widow numbering at 1 instead of 0
set -g pane-base-index 1                               # Start pane numbering at 1 instead of 0
set -g allow-rename on                                 # Allow programs to rename windows automatically
set -g renumber-windows on                             # Automatically renumber windows when change the number of then
set -g default-terminal "${TERM}"                      # Set default terminal type from your choise terminal
set -g mouse on                                        # Enable mouse support
set -g set-titles on                                   # Set terminal window title to match tmux session/window
setw -g monitor-activity on                            # Highlight windows with activity in the status bar
set -g bell-action any                                 # Ring bell when any windows has bell
set -g visual-bell off                                 # Don't show visual bell indicators
set -g visual-activity off                             # Don't show visual indicators for window activity
set -g focus-events on                                 # Send focus events to programs (useful for vim/editor autoreload)
setw -g aggressive-resize on                           # Resize window to smallest client actively viewing it
set -g detach-on-destroy off                           # Don't detach session when destrying a window
set -s escape-time 0                                   # Remove delay when pressing escape
set -as terminal-features ",*:RGB"                     # Enable RGB (true color)
set-option -ga terminal-overrides ",xterm-256color:Tc" # Enable true color for xterm-256color

# KEYMAPS
# -r means that the bind can repeat without entering prefix again
# -n means that the bind doesn't use the prefix

# Change the default prefix
unbind C-b
set -g prefix C-s

bind C-s send-prefix

# Reload the config
unbind r
bind r source-file ~/.tmux.conf\; display-message '~/.tmux.conf reload'

# Allow holding Ctrl when using prefix+p/n
bind -r C-p previous-window
bind -r C-n next-window

# Move around pane line vim
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Switch between previous and next window
bind -r Tab next-window
bind -r S-Tab previous-window

# Resize panes
bind -r H resize-pane -L
bind -r J resize-pane -D
bind -r K resize-pane -U
bind -r L resize-pane -R

# Alt+number to select window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# open lazygit in a new window
bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"

# Split window horizontally or vertically
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim keymaps
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane
